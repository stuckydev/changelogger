# App configuration — add new apps here.
# parser: rss | todoist_html | notion_html | github_releases | capacities_html | cursor_html | microsoft_store_html | zendesk_articles
# github_releases: set github_repo (source_url is derived automatically)
# logo_url: optional, defaults to /static/logos/{slug}.svg
# category: saas | selfhosted | games | utilities

apps:
  - slug: todoist
    name: Todoist
    category: saas
    color: "#E44332"
    source_url: https://www.todoist.com/help/articles/2026-changelog-HD3jJAtLd
    parser: todoist_html

  - slug: 1password
    name: 1Password
    subtitle: Windows
    category: saas
    color: "#0572EC"
    source_url: https://releases.1password.com/windows/stable/index.xml
    parser: rss

  - slug: notion
    name: Notion
    category: saas
    color: "#191919"
    source_url: https://www.notion.com/releases
    parser: notion_html

  - slug: capacities
    name: Capacities
    category: saas
    color: "#4F46E5"
    source_url: https://capacities.io/whats-new/
    parser: capacities_html

  - slug: cursor
    name: Cursor
    category: saas
    color: "#14120B"
    source_url: https://cursor.com/changelog
    parser: cursor_html

  - slug: actual
    name: Actual Budget
    category: selfhosted
    color: "#6B46C1"
    github_repo: actualbudget/actual
    parser: github_releases

  - slug: mtgarena
    name: MTG Arena
    subtitle: Client
    category: games
    color: "#E07B39"
    source_url: https://mtgarena-support.wizards.com/api/v2/help_center/en-us/sections/4402585813268/articles.json?per_page=5&sort_by=created_at&sort_order=desc
    parser: zendesk_articles

  - slug: winutil
    name: WinUtil
    subtitle: Chris Titus Tech
    category: utilities
    color: "#2563EB"
    github_repo: ChrisTitusTech/winutil
    parser: github_releases
    github_simple: true

  - slug: workinghours
    name: WorkingHours
    subtitle: Windows
    category: utilities
    color: "#0EA5E9"
    source_url: https://apps.microsoft.com/detail/9mv51b301wfd?hl=de-DE&gl=DE
    parser: microsoft_store_html

  - slug: glazewm
    name: GlazeWM
    category: utilities
    color: "#6366F1"
    github_repo: glzr-io/glazewm
    parser: github_releases
    github_simple: true

  - slug: powertoys
    name: PowerToys
    category: utilities
    color: "#F2C811"
    github_repo: microsoft/PowerToys
    parser: github_releases
    github_simple: true
