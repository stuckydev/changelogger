{% extends "base.html" %}

{% block body %}
<div class="app-shell">
  <button
    type="button"
    class="sidebar-toggle"
    id="sidebar-toggle"
    aria-controls="app-sidebar"
    aria-expanded="false"
    aria-label="Menü öffnen"
  >
    <span class="sidebar-toggle__bars" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </span>
  </button>

  <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>

  <aside class="app-sidebar" id="app-sidebar" aria-label="Menü" aria-hidden="true">
    <div class="app-sidebar__header">
      <div class="app-sidebar__brand">
        <h1 class="app-title">Changelogger</h1>
      </div>
      <button
        type="button"
        class="sidebar-close"
        id="sidebar-close"
        aria-label="Menü schließen"
        hidden
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="app-filter">
      <ul class="app-filter-list" id="app-filter-list" role="group" aria-label="Apps">
        {% include "partials/sidebar_apps.html" %}
      </ul>
    </div>

    <footer class="app-sidebar__footer">
      <p class="app-sidebar__sync" id="sidebar-sync-status">
        {% include "partials/sidebar_sync.html" %}
      </p>
      <button type="button" class="sidebar-theme-toggle" id="theme-toggle" aria-label="Design umschalten" title="Design umschalten">
        <span class="theme-icon theme-icon--dark" aria-hidden="true">☀</span>
        <span class="theme-icon theme-icon--light" aria-hidden="true">☾</span>
      </button>
    </footer>
  </aside>

  <main class="app-main" id="main-content">
    <div id="feed-root" aria-live="polite" aria-busy="false">
      {% with entries=page.entries, has_sync_data=page.has_sync_data %}
        {% include "partials/feed.html" %}
      {% endwith %}
    </div>
  </main>
</div>
{% endblock %}
