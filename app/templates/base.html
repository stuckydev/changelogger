<!DOCTYPE html>
<html lang="en" data-theme="{{ page.theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Changelogger</title>
  <link rel="icon" href="/static/favicon.svg?v={{ static_asset_version }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css?v={{ static_asset_version }}">
  <script>
    (function () {
      var key = "{{ app_prefix }}-theme";
      var cookieName = "{{ app_prefix }}_theme";
      var stored = localStorage.getItem(key);
      if (stored === "light" || stored === "dark") {
        document.documentElement.dataset.theme = stored;
        document.cookie = cookieName + "=" + stored + ";path=/;max-age=31536000;SameSite=Lax";
      }
    })();
  </script>
</head>
<body>
  {% block body %}{% endblock %}
  <script type="application/json" id="apps-config">{{ apps_json | safe }}</script>
  <script src="/static/app.js?v={{ static_asset_version }}" defer></script>
</body>
</html>
