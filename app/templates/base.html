<!DOCTYPE html>
<html lang="de" data-theme="{{ page.theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Changelogger</title>
  <link rel="icon" href="/static/favicon.svg?v={{ static_asset_version }}" type="image/svg+xml">
  <link rel="preload" href="/static/fonts/inter/inter-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin>
  <style>{{ inline_app_styles | safe }}</style>
  <script>
    (function () {
      var match = document.cookie.match(/(?:^|;\s*){{ app_prefix }}_theme=(dark|light)/);
      if (match) document.documentElement.dataset.theme = match[1];
    })();
  </script>
</head>
<body>
  {% block body %}{% endblock %}
  <script src="/static/app.js?v={{ static_asset_version }}" defer></script>
</body>
</html>
