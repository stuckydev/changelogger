services:
  changelogger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: changelogger
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      - "${PORT:-47173}:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    user: "${UID:-1000}:${GID:-1000}"
