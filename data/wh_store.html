    <meta name="description" content="Arbeitszeit erfassen, Stunden korrigieren und daraus nutzbare Stundenzettel machen: WorkingHours hilft dir, Arbeitsstunden, Projekte, &#xDC;berstunden und abrechenbare Zeiten &#xFC;bersichtlich zu dokumentieren - ohne Abo. Ideal f&#xFC;r Freelancer, Selbstst&#xE4;ndige, Berater, Auftragnehmer, Angestellte und alle, die eine praktische Zeiterfassung f&#xFC;r Windows suchen.&#xA;&#xA;Starte deine Zeiterfassung per Timer wie mit einer Stempeluhr, pausiere bei Bedarf, erg&#xE4;nze vergessene Zeiten manuell und bearbeite Eintr&#xE4;ge sp&#xE4;ter. So bleibt dein Work Log auch dann korrekt, wenn der Arbeitstag nicht perfekt nach Plan l&#xE4;uft.&#xA;&#xA;F&#xFC;r den Alltag gemacht:&#xA;&#x2022; Arbeitszeit mit Start-, Pause- und Stopp-Timer erfassen&#xA;&#x2022; Pausen nachverfolgen und auf Wunsch automatisch abziehen&#xA;&#x2022; Arbeitszeiten manuell hinzuf&#xFC;gen, &#xE4;ndern und korrigieren&#xA;&#x2022; Sitzungen, die &#xFC;ber Mitternacht laufen, automatisch aufteilen&#xA;&#x2022; Stunden nach Aufgaben, Projekten, Tags und Notizen organisieren&#xA;&#x2022; Stundens&#xE4;tze, Einnahmen, Pauschalen und billable hours im Blick behalten&#xA;&#x2022; &#xDC;berstunden erfassen und Zeit oder Einnahmen per Tag-Regeln anpassen&#xA;&#x2022; Eintr&#xE4;ge schnell suchen und filtern&#xA;&#xA;Aus Stunden werden auswertbare Daten:&#xA;&#x2022; Diagramme und Berichte f&#xFC;r Dauer oder Umsatz anzeigen&#xA;&#x2022; Stundenzettel nach Tag, Woche, Monat, Aufgabe oder Tag gruppieren&#xA;&#x2022; Export nach Excel oder CSV mit anpassbaren Spalten&#xA;&#x2022; PDF-Rechnungen auf Basis deiner Daten &#xFC;ber SubTotal erstellen&#xA;&#xA;Praktisch auf Windows:&#xA;&#x2022; Timer steuern, ohne immer die komplette App zu &#xF6;ffnen, z. B. &#xFC;ber Mini-Fenster oder Overlay-Steuerung&#xA;&#x2022; Inaktivit&#xE4;tserkennung nutzen, um vergessene Zeiten leichter zu pr&#xFC;fen und zu korrigieren&#xA;&#x2022; Pomodoro- und Fokus-Sitzungen f&#xFC;r strukturierte Arbeitsphasen verwenden&#xA;&#x2022; Termine aus System- oder Outlook-Kalendern anzeigen und importieren, wo verf&#xFC;gbar&#xA;&#xA;Weiterarbeiten auf deinen Ger&#xE4;ten:&#xA;WorkingHours ist auch f&#xFC;r Android, iOS und macOS verf&#xFC;gbar. Wenn du m&#xF6;chtest, kannst du deine Daten per optionaler Synchronisation &#xFC;ber deinen eigenen Cloud-Speicher zwischen Handy, Tablet, Laptop und Desktop weiterverwenden. Unterst&#xFC;tzt werden OneDrive, Google Drive, Dropbox, iCloud und WebDAV.&#xA;&#xA;Datenschutz und Kontrolle:&#xA;F&#xFC;r WorkingHours brauchst du kein Konto und keine Registrierung. Die Synchronisation l&#xE4;uft optional &#xFC;ber deinen eigenen Cloud-Speicher statt &#xFC;ber ein propriet&#xE4;res WorkingHours-Konto.&#xA;&#xA;WorkingHours eignet sich als Zeiterfassung, Arbeitszeit App, Projekt-Zeiterfassung, &#xDC;berstunden-Tracker, Stundenzettel-App und pers&#xF6;nliches Arbeitsprotokoll. Ob du Arbeitszeit erfassen, abrechenbare Stunden dokumentieren oder einfach besser verstehen willst, wo dein Arbeitstag bleibt: Die App bietet dir daf&#xFC;r einen klaren, flexiblen Ablauf.&#xA;&#xA;Preisinfo:&#xA;Die App ist kostenlos nutzbar. Einige erweiterte Funktionen geh&#xF6;ren zu WorkingHours Pro und lassen sich nach der Installation 7 Tage testen.&#xA;&#xA;WorkingHours Pro ist ein einmaliger Kauf f&#xFC;r Windows und wird mit deinem Microsoft-Konto verkn&#xFC;pft. F&#xFC;r andere Plattformen kann ein separater Pro-Kauf erforderlich sein.">

        <script type="application/ld&#x2B;json">
            {"@context":"https://schema.org","@type":"SoftwareApplication","name":"WorkingHours: Zeiterfassung, Stempeluhr & Stundenzettel – Kostenloser Download und Installation unter Windows | Microsoft Store","description":"Arbeitszeit erfassen, Stunden korrigieren und daraus nutzbare Stundenzettel machen: WorkingHours hilft dir, Arbeitsstunden, Projekte, Überstunden und abrechenbare Zeiten übersichtlich zu dokumentieren - ohne Abo. Ideal für Freelancer, Selbstständige, Berater, Auftragnehmer, Angestellte und alle, die eine praktische Zeiterfassung für Windows suchen.\n\nStarte deine Zeiterfassung per Timer wie mit einer Stempeluhr, pausiere bei Bedarf, ergänze vergessene Zeiten manuell und bearbeite Einträge später. So bleibt dein Work Log auch dann korrekt, wenn der Arbeitstag nicht perfekt nach Plan läuft.\n\nFür den Alltag gemacht:\n• Arbeitszeit mit Start-, Pause- und Stopp-Timer erfassen\n• Pausen nachverfolgen und auf Wunsch automatisch abziehen\n• Arbeitszeiten manuell hinzufügen, ändern und korrigieren\n• Sitzungen, die über Mitternacht laufen, automatisch aufteilen\n• Stunden nach Aufgaben, Projekten, Tags und Notizen organisieren\n• Stundensätze, Einnahmen, Pauschalen und billable hours im Blick behalten\n• Überstunden erfassen und Zeit oder Einnahmen per Tag-Regeln anpassen\n• Einträge schnell suchen und filtern\n\nAus Stunden werden auswertbare Daten:\n• Diagramme und Berichte für Dauer oder Umsatz anzeigen\n• Stundenzettel nach Tag, Woche, Monat, Aufgabe oder Tag gruppieren\n• Export nach Excel oder CSV mit anpassbaren Spalten\n• PDF-Rechnungen auf Basis deiner Daten über SubTotal erstellen\n\nPraktisch auf Windows:\n• Timer steuern, ohne immer die komplette App zu öffnen, z. B. über Mini-Fenster oder Overlay-Steuerung\n• Inaktivitätserkennung nutzen, um vergessene Zeiten leichter zu prüfen und zu korrigieren\n• Pomodoro- und Fokus-Sitzungen für strukturierte Arbeitsphasen verwenden\n• Termine aus System- oder Outlook-Kalendern anzeigen und importieren, wo verfügbar\n\nWeiterarbeiten auf deinen Geräten:\nWorkingHours ist auch für Android, iOS und macOS verfügbar. Wenn du möchtest, kannst du deine Daten per optionaler Synchronisation über deinen eigenen Cloud-Speicher zwischen Handy, Tablet, Laptop und Desktop weiterverwenden. Unterstützt werden OneDrive, Google Drive, Dropbox, iCloud und WebDAV.\n\nDatenschutz und Kontrolle:\nFür WorkingHours brauchst du kein Konto und keine Registrierung. Die Synchronisation läuft optional über deinen eigenen Cloud-Speicher statt über ein proprietäres WorkingHours-Konto.\n\nWorkingHours eignet sich als Zeiterfassung, Arbeitszeit App, Projekt-Zeiterfassung, Überstunden-Tracker, Stundenzettel-App und persönliches Arbeitsprotokoll. Ob du Arbeitszeit erfassen, abrechenbare Stunden dokumentieren oder einfach besser verstehen willst, wo dein Arbeitstag bleibt: Die App bietet dir dafür einen klaren, flexiblen Ablauf.\n\nPreisinfo:\nDie App ist kostenlos nutzbar. Einige erweiterte Funktionen gehören zu WorkingHours Pro und lassen sich nach der Installation 7 Tage testen.\n\nWorkingHours Pro ist ein einmaliger Kauf für Windows und wird mit deinem Microsoft-Konto verknüpft. Für andere Plattformen kann ein separater Pro-Kauf erforderlich sein.","alternateName":"WorkingHours","image":"https://store-images.s-microsoft.com/image/apps.5651.13799954966451185.8b83ae7c-0e20-4c14-9eb6-0a19cb73a11c.91d4fcdc-942c-43d5-8538-dafe9886ed52","url":"https://apps.microsoft.com/detail/9mv51b301wfd?hl=de-DE&gl=DE","aggregateRating":{"@type":"AggregateRating","bestRating":5,"ratingValue":4.800000190734863,"worstRating":1,"ratingCount":1041},"author":{"@type":"Person","name":"T. Partl","url":"https://apps.microsoft.com/search/publisher?name=T.+Partl&hl=de-DE&gl=DE"},"offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"applicationCategory":"Produktivität","featureList":["Arbeitszeit mit Start-, Pause- und Stopp-Timer erfassen","Pausen verfolgen und auf Wunsch automatisch abziehen","Zeiten manuell hinzufügen, bearbeiten und korrigieren","Aufgaben, Projekte, Tags und Notizen für klare Zuordnung","Überstunden, Stundensätze, Einnahmen und Pauschalen im Blick","Diagramme und Berichte für Dauer oder Umsatz anzeigen","Stundenzettel nach Excel oder CSV exportieren","Exportspalten anpassen und nach Tag, Woche, Monat oder Projekt gruppieren","PDF-Rechnungen aus deinen Daten über SubTotal erstellen","Timer auf Windows per Mini-Fenster oder Overlay steuern","Inaktivitätserkennung für leichteres Korrigieren vergessener Zeiten","Pomodoro- und Fokus-Sitzungen für strukturierte Arbeit","Termine aus System- oder Outlook-Kalendern anzeigen und importieren","Optionale Synchronisation über eigenen Cloud-Speicher","Kein Konto und keine Registrierung erforderlich"],"operatingSystem":"Windows 10-Version 19041.0 oder höher","screenshot":[{"BackgroundColor":"","ForegroundColor":"","@type":"ImageObject","url":"https://store-images.s-microsoft.com/image/apps.28609.13799954966451185.eabb70f1-1d03-47c3-89e0-d7fd707a9639.64276f5d-1f2c-47a5-923f-c75e3ec496c3","position":"Desktop/0","height":2160,"width":3840},{"BackgroundColor":"","ForegroundColor":"","@type":"ImageObject","url":"https://store-images.s-microsoft.com/image/apps.64165.13799954966451185.eabb70f1-1d03-47c3-89e0-d7fd707a9639.ba2f96ff-691d-49fd-ac7c-200e6c790f14","position":"Desktop/1","height":2160,"width":3840},{"BackgroundColor":"","ForegroundColor":"","@type":"ImageObject","url":"https://store-images.s-microsoft.com/image/apps.20813.13799954966451185.eabb70f1-1d03-47c3-89e0-d7fd707a9639.31f07134-1865-416a-863e-00fcf3025b89","position":"Desktop/2","height":2160,"width":3840},{"BackgroundColor":"","ForegroundColor":"","@type":"ImageObject","url":"https://store-images.s-microsoft.com/image/apps.64633.13799954966451185.eabb70f1-1d03-47c3-89e0-d7fd707a9639.a6834152-752d-4692-82fb-ee82879d0fe9","position":"Desktop/3","height":2160,"width":3840},{"BackgroundColor":"","ForegroundColor":"","@type":"ImageObject","url":"https://store-im age.Header":"Sprache","BadgePage.StaticLanguage.Tooltip":"W\u00E4hlen Sie die Sprache aus, in der das Badge angezeigt werden soll.","BadgePage.WebComponentLanguage.Tooltip":"Bei der automatischen Erkennung (empfohlen) wird das Badge in der Sprache des Browsers des Benutzers angezeigt. W\u00E4hlen alternativ Sie eine Sprache aus, um das Badge immer in dieser Sprache anzuzeigen.","BadgePage.Launch.Header":"Startmodus","BadgePage.Launch.Tooltip":"Der Startmodus f\u00FCr Ihre App, wenn Benutzer auf Ihren Badge klicken. Der Direktmodus l\u00E4dt die ausf\u00FChrbare Installationsdatei Ihrer App herunter und ist die Standardeinstellung. Im Vollmodus wird die Produktseite Ihrer App in der Store-App ge\u00F6ffnet.","BadgePage.WebComponent.Tab":"Webkomponente","BadgePage.TabAriaLabel":"Registerkarte \u201E{0}\u201C","BadgePage.TabSelectedAriaLabel":"Ausgew\u00E4hlte Registerkarte \u201E{0}\u201C","BadgePage.Theme.Header":"Thema","BadgePage.StaticTheme.Tooltip":"Das zu verwendende Badge-Design. Auf hellen Hintergr\u00FCnden sollten Sie ein dunkles Design (und umgekehrt) w\u00E4hlen.","BadgePage.WebComponentTheme.Tooltip":"Die automatische Erkennung wird das Design des Benutzers erkennen und das entsprechende Abzeichendesign anzeigen.","BadgePage.Title":"Erstellen Ihres App-Badges","BadgePage.Tooltip":"Weitere Informationen zu {0}","BadgePage.Guidelines.Tooltip":"Richtlinien","BadgePage.False.Option":"Falsch","BadgePage.True.Option":"Wahr","BadgePage.Direct.Option":"Direkt","BadgePage.Full.Option":"Voll","BadgePage.None.Option":"Keine","BadgePage.Dark.Option":"Dunkel","BadgePage.Light.Option":"Hell","BadgePage.Off.Option":"Aus","BadgePage.On.Option":"Ein","BadgePage.AutoDetect.Option":"Automatische Ermittlung","BadgePage.GenerateBadge":"Generieren Ihres Badges","BadgePage.CopiedClipboard":"In Zwischenablage kopiert!","BadgePage.StaticBadge.Title":"Statisches Badge","BadgePage.StaticBadge.SimpleDescription":"Ein einfaches, leichtes Badge mit einem Standardbild und Link.","BadgePage.StaticBadge.Description":"Dieser Badge eignet sich ideal f\u00FCr READMEs, Dokumentationswebsites, Umgebungen mit Inhaltssicherheitsrichtlinien oder \u00FCberall, wo externe Skripts eingeschr\u00E4nkt sind.\u00A0","BadgePage.WebComponentBadge.Title":"Badge f\u00FCr Webkomponente","BadgePage.WebComponentBadge.SimpleDescription":"Ein dynamisches, interaktives Badge, das als Webkomponente erstellt wurde.","BadgePage.WebComponentBadge.Description":"Dieser Badge ist JavaScript-basiert und bietet moderne Features wie automatische Gebietsschema- und Designerkennung sowie eine reibungslose Hoveranimation. W\u00E4hlen Sie diese Option aus, wenn Sie die beste, am besten angepasste Erfahrung f\u00FCr Ihre Benutzer w\u00FCnschen.","BadgePage.GetStarted.Title":"Erste Schritte","BadgePage.GetStarted.Description":"F\u00FChren Sie diese Schritte aus, um Ihren Badge zu generieren und zu Ihrer Website hinzuzuf\u00FCgen.","BadgePage.GetStarted.Step1.Title":"Badgetyp ausw\u00E4hlen","BadgePage.GetStarted.Step1.Description":"W\u00E4hlen Sie zwischen einer Webkomponente oder einem statischen Badge. Wenn Sie unsicher sind, ist das statische Badge die sichere Wahl.","BadgePage.GetStarted.Step2.Title":"App-ID eingeben","BadgePage.GetStarted.Step2.Description":"F\u00FCgen Sie Ihre 12-stellige App-ID (in Ihrem Partner Center Dashboard) in das Textfeld ein.","BadgePage.GetStarted.Step3.Title":"Eigenschaften ausw\u00E4hlen","BadgePage.GetStarted.Step3.Description":"Passen Sie Sprache, Design und Startziele an oder f\u00FCgen Sie eine Kampagnen-ID hinzu, um die Leistung zu verfolgen.","BadgePage.GetStarted.Step4.Title":"Code kopieren","BadgePage.GetStarted.Step4.Description":"Klicken Sie auf \u0022Badge generieren\u0022, und f\u00FCgen Sie den Ausschnitt direkt in den Code Ihrer Website ein.","BadgePage.Guidelines.Title":"Richtlinien und Best Practices","BadgePage.Guidelines.Description":"Befolgen Sie diese bew\u00E4hrten Methoden, um Ihre Konversionsraten zu maximieren und die Markenkonsistenz zu wahren.","BadgePage.Guidelines.KeepItClear.Title":"\u00DCbersichtlich halten","BadgePage.Guidelines.KeepItClear.Description":"Halten Sie den Standardabstand um das Badge ein. \u00DCberladen Sie es nicht mit anderem Text oder Grafiken.","BadgePage.Guidelines.PlaceProminent.Title":"Prominent platzieren","BadgePage.Guidelines.PlaceProminent.Description":"Um die besten Klickraten zu erzielen, platzieren Sie den Badge \u0022oberhalb der Faltung\u0022 auf Ihrer Homepage oder direkt neben der Liste der prim\u00E4ren Features Ihrer App.","BadgePage.Guidelines.DontAlter.Title":"Grafik nicht \u00E4ndern","BadgePage.Guidelines.DontAlter.Description":"Verwenden Sie den generierten Code direkt. Strecken, f\u00E4rben oder \u00E4ndern Sie die Badgegrafiken nicht, da dies gegen die Microsoft Store-Markenrichtlinien verst\u00F6\u00DFt.","BadgePage.Guidelines.CampaignId.Title":"Kampagnen-ID zur Leistungsmessung hinzuf\u00FCgen","BadgePage.Guidelines.CampaignId.Description":"Das Anf\u00FCgen einer Kampagnen-ID erm\u00F6glicht es, Besucher und Abschl\u00FCsse zu verfolgen, sodass Sie verschiedene Platzierungen einfach testen k\u00F6nnen. Denn was nicht gemessen wird, kann nicht verbessert werden!","BadgePage.Guidelines.DownloadLink":"Vollst\u00E4ndige Richtlinien herunterladen (PDF)","BadgePage.FAQ.Title":"H\u00E4ufig gestellte Fragen","BadgePage.FAQ.FindAppId.Question":"Wo finde ich meine 12-stellige App-ID (Produkt-ID)?","BadgePage.FAQ.FindAppId.Answer1":"Ihre App-ID (auch als Produkt-ID bekannt) ist ein eindeutiger alphanumerischer Code mit 12\u00A0Zeichen, der Ihrer App zugewiesen wird. Sie finden diese im Windows Partner Center Dashboard. \u00D6ffnen Sie die Seite Ihrer App, w\u00E4hlen Sie App-Verwaltung\u00A0\u003E App-Identit\u00E4t aus und suchen Sie den Wert \u201EStore-ID\u201C.","BadgePage.FAQ.FindAppId.Answer2":"Alternativ finden Sie Ihre App auf apps.microsoft.com. Ihre App-ID ist der 12-stellige Code am Ende der URL: apps.microsoft.com/detail/\u003CAppID\u003E.","BadgePage.FAQ.TrackDownloads.Question":"Wie kann ich nachverfolgen, wie viele Downloads von meiner Website generiert werden?","BadgePage.FAQ.TrackDownloads.Answer":"Sie k\u00F6nnen die Leistung Ihres Badges verfolgen, indem Sie Ihrem Badge-Link eine Kampagnen-ID (CID) hinzuf\u00FCgen. Geben Sie beim Erstellen Ihres Badges oben einen individuellen Kampagnennamen ein (z. B. \u201Efooapp_website\u201C). Anschlie\u00DFend k\u00F6nnen Sie die Klickraten und Konversionsdaten zu dieser speziellen Kampagne im Akquisitionsbericht Ihres Partner Centers einsehen.","BadgePage.FAQ.WhichBadgeType.Question":"Welchen Badgetyp sollte ich w\u00E4hlen: statisch oder Webkomponente?","BadgePage.FAQ.WhichBadgeType.Answer1":"W\u00E4hlen Sie die Webkomponente aus, um ein optimales Benutzererlebnis auf modernen Websites zu erzielen. Es erkennt automatisch die Systemsprache des Benutzers, aktualisiert die aktuelle Designsprache von Microsoft und bietet reibungslose Hoveranimationen.","BadgePage.FAQ.WhichBadgeType.Answer2":"W\u00E4hlen Sie das statische Badge, wenn Ihre Plattform JavaScript einschr\u00E4nkt (wie GitHub-READMEs, WordPress ohne benutzerdefiniertes JS oder Umgebungen mit strenger Inhalts-Sicherheitsrichtlinie).","BadgePage.FAQ.UpdateBadge.Question":"Muss ich mein Badge aktualisieren, wenn der Microsoft Store sein Branding \u00E4ndert?","BadgePage.FAQ.UpdateBadge.Answer":"Wenn Sie die von dieser Seite generierten Badges verwenden, nein. Die Objekte werden von Microsoft gehostet und aktualisieren Ihren Badge automatisch, um zuk\u00FCnftige \u00C4nderungen an Derbranding oder Design widerzuspiegeln.","BadgePage.FAQ.ResizeBadge.Question":"Kann ich das Badge an das Design meiner Website anpassen?","BadgePage.FAQ.ResizeBadge.Answer":"Das Webkomponenten-Badge ist von Natur aus responsiv und passt sich automatisch an. Wenn Sie das statische Bild verwenden, k\u00F6nnen Sie es mit CSS skalieren (z.\u00A0B. durch Anpassen des Werts \u201Emax-width\u201C), dabei muss jedoch das urspr\u00FCngliche Seitenverh\u00E4ltnis erhalten bleiben. Strecken, Verzerren oder Zuschneiden des Bildes ist nicht erlaubt.","BadgePage.FAQ.DarkMode.Question":"Unterst\u00FCtzt das Badge den dunklen Modus?","BadgePage.FAQ.DarkMode.Answer":"Ja. Das Webkomponenten-Badge erkennt automatisch das Systemdesign der Benutzer oder das CSS-Design Ihrer Website und zeigt eine dunkle oder helle Variante an. Sie k\u00F6nnen auch erzwingen, dass es mithilfe der oben genannten Generatortools immer im dunklen oder hellen Modus angezeigt wird.","BadgePage.SideNav.GetStarted":"Erste Schritte","BadgePage.SideNav.BuildYourBadge":"Badge erstellen","BadgePage.SideNav.StaticBadge":"Statisches Badge","BadgePage.SideNav.WebComponentBadge":"Badge f\u00FCr Webkomponente","BadgePage.SideNav.Guidelines":"Richtlinien","BadgePage.SideNav.FAQ":"H\u00E4ufig gestellte Fragen","Common.CollectionsTitle":"Sammlungen","CollectionReel.PlayButton":"Animation auf der Sammlungsrolle wiedergeben","CollectionReel.PauseButton":"Animation auf der Sammlungsrolle anhalten","Common.PageTitle":"{0} \u2013 Microsoft-Apps","Common.PageAppsTitle":"{0} \u2013 Herunterladen und Installieren unter Windows | Microsoft Store","Common.PageAppsFreeTitle":"{0} \u2013 Kostenloser Download und Installation unter Windows | Microsoft Store","Common.PageGameTitle":"{0} \u2013 Herunterladen und Spielen unter Windows | Microsoft Store","Common.PageGameFreeTitle":"{0} \u2013 Kostenloser Download und Spielen unter Windows | Microsoft Store","MsStoreDetails.PageTitle":"Microsoft Store-App unter Windows herunterladen und installieren","Common.ScrollLeft.ButtonTitle":"Nach links scrollen","Common.ScrollRight.ButtonTitle":"Nach rechts scrollen","Common.ScrollToTop.ButtonTitle":"Bildlauf zum Anfang","Common.SeeAll":"Alle anzeigen","Common.SeeAllTitle":"Alle {0} anzeigen. Verwenden Sie die Pfeiltasten, um die Elemente zu durchsuchen","Collection.LoadMore":"Mehr anzeigen","Common.SeeDetails":"Details anzeigen","Common.AdBadge":"Anzeige","Common.MenuI
